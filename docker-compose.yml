version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dscr_loans
      POSTGRES_USER: dscr_user
      POSTGRES_PASSWORD: dscr_local_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dscr_user -d dscr_loans"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
